name: Resume Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to resume publishing (for example 2.1.0-rc.2)
        required: true
        type: string
      release_channel:
        description: Dist-tag mode for npm publishing
        required: true
        default: auto
        type: choice
        options:
          - auto
          - rc
          - latest
      publish_typescript:
        description: Resume npm packages publish
        required: true
        default: false
        type: boolean
      publish_android:
        description: Resume Android Maven Central publish
        required: true
        default: false
        type: boolean
      publish_sparkling_method:
        description: Resume SparklingMethod pod publish
        required: true
        default: false
        type: boolean
      publish_sparkling:
        description: Resume Sparkling pod publish
        required: true
        default: false
        type: boolean
      publish_debug_tool:
        description: Resume Sparkling-DebugTool pod publish
        required: true
        default: false
        type: boolean
      publish_router:
        description: Resume Sparkling-Router pod publish
        required: true
        default: false
        type: boolean
      publish_media:
        description: Resume Sparkling-Media pod publish
        required: true
        default: false
        type: boolean
      publish_storage:
        description: Resume Sparkling-Storage pod publish
        required: true
        default: false
        type: boolean
      publish_ios:
        description: Run full iOS publish (build all pods + upload to GitHub Release + push to CocoaPods trunk)
        required: true
        default: false
        type: boolean
      publish_template:
        description: Resume sparkling-app-template publish
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: '22.21.1'
  PNPM_VERSION: '10.26.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Resume Publish
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      is_rc: ${{ steps.prepare.outputs.is_rc }}
      npm_tag: ${{ steps.prepare.outputs.npm_tag }}
    steps:
      - name: Resolve version and channel
        id: prepare
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANNEL="${{ github.event.inputs.release_channel }}"

          if [ -z "$VERSION" ]; then
            echo "::error::version is required"
            exit 1
          fi

          if [[ "$CHANNEL" == "rc" ]]; then
            IS_RC=true
          elif [[ "$CHANNEL" == "latest" ]]; then
            IS_RC=false
          elif [[ "$VERSION" =~ -rc\.[0-9]+$ ]]; then
            IS_RC=true
          else
            IS_RC=false
          fi

          if [ "$IS_RC" = "true" ]; then
            NPM_TAG=rc
          else
            NPM_TAG=latest
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_rc=$IS_RC" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

          echo "Resume publish plan"
          echo "  version: $VERSION"
          echo "  is_rc:   $IS_RC"
          echo "  npm_tag: $NPM_TAG"

  preflight-registry-auth:
    name: Preflight npm + Maven auth
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ github.event.inputs.publish_typescript == 'true' || github.event.inputs.publish_android == 'true' || github.event.inputs.publish_template == 'true' }}
    environment:
      name: package releasement
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify npm registry connectivity
        run: |
          npm ping --registry https://registry.npmjs.org

      - name: Verify Maven Central credentials and API reachability
        if: ${{ github.event.inputs.publish_android == 'true' }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          MISSING=""
          [ -z "$MAVEN_CENTRAL_USERNAME" ] && MISSING="$MISSING MAVEN_CENTRAL_USERNAME"
          [ -z "$MAVEN_CENTRAL_PASSWORD" ] && MISSING="$MISSING MAVEN_CENTRAL_PASSWORD"
          [ -z "$SIGNING_KEY_ID" ] && MISSING="$MISSING SIGNING_KEY_ID"
          [ -z "$SIGNING_PASSWORD" ] && MISSING="$MISSING SIGNING_PASSWORD"
          [ -z "$SIGNING_KEY" ] && MISSING="$MISSING SIGNING_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing Maven Central secrets:$MISSING"
            exit 1
          fi

          BEARER_TOKEN=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${BEARER_TOKEN}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/search/repositories?ip=any&profile_id=com.tiktok.sparkling")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Maven Central API auth check failed (HTTP $HTTP_CODE)."
            exit 1
          fi

  preflight-cocoapods-auth:
    name: Preflight CocoaPods auth
    runs-on: macos-latest
    needs: prepare
    if: ${{ github.event.inputs.publish_sparkling_method == 'true' || github.event.inputs.publish_sparkling == 'true' || github.event.inputs.publish_debug_tool == 'true' || github.event.inputs.publish_router == 'true' || github.event.inputs.publish_media == 'true' || github.event.inputs.publish_storage == 'true' || github.event.inputs.publish_template == 'true' }}
    environment:
      name: package releasement
    steps:
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.6'

      - name: Install CocoaPods
        run: bundle install

      - name: Verify CocoaPods trunk token
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          if [ -z "$COCOAPODS_TRUNK_TOKEN" ]; then
            echo "::error::COCOAPODS_TRUNK_TOKEN secret is missing or empty."
            exit 1
          fi
          COCOAPODS_TRUNK_TOKEN=$COCOAPODS_TRUNK_TOKEN bundle exec pod trunk me >/tmp/pod_trunk_me.txt 2>&1 || {
            cat /tmp/pod_trunk_me.txt
            echo "::error::bundle exec pod trunk me failed. Check COCOAPODS_TRUNK_TOKEN validity."
            exit 1
          }
          echo "✅ CocoaPods trunk token is valid"

  publish-typescript:
    name: Resume NPM Packages
    runs-on: ubuntu-latest
    needs: [prepare, preflight-registry-auth]
    if: ${{ github.event.inputs.publish_typescript == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm
        run: |
          npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter '!sparkling-website' -r build

      - name: Update versions
        run: |
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}

      - name: Publish to npm (skip existing versions)
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          SPARKLING_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ "${{ needs.prepare.outputs.is_rc }}" == "true" ]; then
            node scripts/release-unify-and-publish.mjs publish --version ${{ needs.prepare.outputs.version }} --tag rc --trusted-publishing
          else
            node scripts/release-unify-and-publish.mjs publish --version ${{ needs.prepare.outputs.version }} --release --trusted-publishing
          fi

  publish-android:
    name: Resume Android Maven Publish
    runs-on: ubuntu-latest
    needs: [prepare, preflight-registry-auth]
    if: ${{ github.event.inputs.publish_android == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Update versions
        run: |
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}

      - name: Check Android artifacts status
        id: maven_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          SDK_URL="https://repo1.maven.org/maven2/com/tiktok/sparkling/sparkling/$VERSION/sparkling-$VERSION.pom"
          DEBUG_TOOL_URL="https://repo1.maven.org/maven2/com/tiktok/sparkling/sparkling-debug-tool/$VERSION/sparkling-debug-tool-$VERSION.pom"

          SDK_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SDK_URL" 2>/dev/null || echo "000")
          DEBUG_TOOL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEBUG_TOOL_URL" 2>/dev/null || echo "000")

          if [ "$SDK_STATUS" == "200" ] && [ "$DEBUG_TOOL_STATUS" == "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Maven Central
        if: steps.maven_check.outputs.already_published != 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          chmod +x scripts/publish-android-maven.sh
          ./scripts/publish-android-maven.sh ${{ needs.prepare.outputs.version }} --skip-tests

  publish-ios-cocoapods:
    name: Resume iOS CocoaPods Publish
    runs-on: macos-latest
    needs: [prepare, preflight-cocoapods-auth]
    if: ${{ github.event.inputs.publish_sparkling_method == 'true' || github.event.inputs.publish_sparkling == 'true' || github.event.inputs.publish_debug_tool == 'true' || github.event.inputs.publish_router == 'true' || github.event.inputs.publish_media == 'true' || github.event.inputs.publish_storage == 'true' }}
    environment:
      name: package releasement
    env:
      COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.6'

      - name: Install CocoaPods
        run: bundle install

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update versions
        run: |
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}

      # ── Build phase ────────────────────────────────────────────────

      - name: Build SparklingMethod
        if: ${{ github.event.inputs.publish_sparkling_method == 'true' }}
        run: python3 scripts/build_ios_pod_artifacts.py $VERSION --pod SparklingMethod --output-dir dist/ios

      - name: Build Sparkling-DebugTool
        if: ${{ github.event.inputs.publish_debug_tool == 'true' }}
        run: python3 scripts/build_ios_pod_artifacts.py $VERSION --pod Sparkling-DebugTool --output-dir dist/ios

      - name: Build Sparkling
        if: ${{ github.event.inputs.publish_sparkling == 'true' }}
        run: python3 scripts/build_ios_pod_artifacts.py $VERSION --pod Sparkling --output-dir dist/ios

      - name: Build Sparkling-Router
        if: ${{ github.event.inputs.publish_router == 'true' }}
        run: python3 scripts/build_ios_pod_artifacts.py $VERSION --pod Sparkling-Router --output-dir dist/ios

      - name: Build Sparkling-Media
        if: ${{ github.event.inputs.publish_media == 'true' }}
        run: python3 scripts/build_ios_pod_artifacts.py $VERSION --pod Sparkling-Media --output-dir dist/ios

      - name: Build Sparkling-Storage
        if: ${{ github.event.inputs.publish_storage == 'true' }}
        run: python3 scripts/build_ios_pod_artifacts.py $VERSION --pod Sparkling-Storage --output-dir dist/ios

      # ── Upload built zips to GitHub Release ────────────────────────

      - name: Upload iOS artifacts to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: dist/ios/*.zip
          replacesArtifacts: true
          allowUpdates: true

      # ── Publish phase ──────────────────────────────────────────────

      - name: Publish SparklingMethod to CocoaPods
        if: ${{ github.event.inputs.publish_sparkling_method == 'true' }}
        run: |
          if bundle exec pod trunk info SparklingMethod 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ SparklingMethod $VERSION already on CocoaPods — skipping"
          else
            bundle exec pod trunk push dist/ios/SparklingMethod.podspec.json --allow-warnings
            echo "✅ SparklingMethod pushed"
          fi

      - name: Publish Sparkling-DebugTool to CocoaPods
        if: ${{ github.event.inputs.publish_debug_tool == 'true' }}
        run: |
          if bundle exec pod trunk info Sparkling-DebugTool 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ Sparkling-DebugTool $VERSION already on CocoaPods — skipping"
          else
            bundle exec pod trunk push dist/ios/Sparkling-DebugTool.podspec.json --allow-warnings
            echo "✅ Sparkling-DebugTool pushed"
          fi

      - name: Wait for SparklingMethod on CDN
        if: ${{ github.event.inputs.publish_sparkling == 'true' || github.event.inputs.publish_router == 'true' || github.event.inputs.publish_media == 'true' || github.event.inputs.publish_storage == 'true' }}
        run: |
          echo "⏳ Waiting for SparklingMethod $VERSION on CDN..."
          for i in {1..30}; do
            if bundle exec pod trunk info SparklingMethod 2>/dev/null | grep -q "$VERSION"; then
              echo "✅ SparklingMethod $VERSION is live"; exit 0
            fi
            echo "   waiting... ($i/30)"; sleep 10
          done
          echo "::error::SparklingMethod $VERSION not available on CDN after 5 minutes"
          exit 1

      - name: Publish Sparkling to CocoaPods
        if: ${{ github.event.inputs.publish_sparkling == 'true' }}
        run: |
          if bundle exec pod trunk info Sparkling 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ Sparkling $VERSION already on CocoaPods — skipping"
          else
            bundle exec pod trunk push dist/ios/Sparkling.podspec.json --allow-warnings
            echo "✅ Sparkling pushed"
          fi

      - name: Publish Sparkling-Router to CocoaPods
        if: ${{ github.event.inputs.publish_router == 'true' }}
        run: |
          if bundle exec pod trunk info Sparkling-Router 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ Sparkling-Router $VERSION already on CocoaPods — skipping"
          else
            bundle exec pod trunk push dist/ios/Sparkling-Router.podspec.json --allow-warnings
            echo "✅ Sparkling-Router pushed"
          fi

      - name: Publish Sparkling-Media to CocoaPods
        if: ${{ github.event.inputs.publish_media == 'true' }}
        run: |
          if bundle exec pod trunk info Sparkling-Media 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ Sparkling-Media $VERSION already on CocoaPods — skipping"
          else
            bundle exec pod trunk push dist/ios/Sparkling-Media.podspec.json --allow-warnings
            echo "✅ Sparkling-Media pushed"
          fi

      - name: Publish Sparkling-Storage to CocoaPods
        if: ${{ github.event.inputs.publish_storage == 'true' }}
        run: |
          if bundle exec pod trunk info Sparkling-Storage 2>/dev/null | grep -q "$VERSION"; then
            echo "⚠️ Sparkling-Storage $VERSION already on CocoaPods — skipping"
          else
            bundle exec pod trunk push dist/ios/Sparkling-Storage.podspec.json --allow-warnings
            echo "✅ Sparkling-Storage pushed"
          fi

  publish-ios:
    name: Publish iOS Pods
    runs-on: macos-latest
    needs: [prepare]
    if: ${{ github.event.inputs.publish_ios == 'true' }}
    permissions:
      contents: write
    environment:
      name: package releasement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Publish iOS pods
        uses: ./.github/actions/publish-ios
        with:
          version: ${{ needs.prepare.outputs.version }}
          is_rc: ${{ needs.prepare.outputs.is_rc }}
          cocoapods_trunk_token: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  publish-template:
    name: Resume App Template Publish
    runs-on: macos-latest
    needs: [prepare, preflight-registry-auth, preflight-cocoapods-auth]
    if: ${{ github.event.inputs.publish_template == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update all versions
        run: |
          chmod +x scripts/update-all-version.sh
          ./scripts/update-all-version.sh ${{ needs.prepare.outputs.version }}

      - name: Check template package status
        id: template_check
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if npm view "sparkling-app-template@$VERSION" version --registry https://registry.npmjs.org 2>/dev/null | grep -q "$VERSION"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish template to npm
        if: steps.template_check.outputs.already_published != 'true'
        working-directory: template/sparkling-app-template
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [ "${{ needs.prepare.outputs.npm_tag }}" == "rc" ]; then
            pnpm publish --registry https://registry.npmjs.org --access public --tag rc --no-git-checks
          else
            pnpm publish --registry https://registry.npmjs.org --access public --tag latest --no-git-checks
          fi
